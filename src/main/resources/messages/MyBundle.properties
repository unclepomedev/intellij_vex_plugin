vex.settings.include.path.label=Include path:
vex.settings.include.path.description=<html><body><small>Specify include paths similar to HOUDINI_VEX_PATH.<br>These are used to resolve included files for features like autocomplete.<br>Separate multiple paths with the OS-specific separator (';' for Windows, ':' for macOS/Linux).</small></body></html>
vex.settings.display.name=VEX
vex.settings.hfs.path.label=Houdini installation path ($HFS):
vex.settings.hfs.path.dialog.title=Select Houdini Installation Path
vex.settings.hfs.path.description=<html><body><small>Path to the Houdini installation directory (e.g., C:\\Program Files\\Side Effects Software\\Houdini 21.0.xxx or /Applications/Houdini/Houdini21.0.xxx).<br>This is required to resolve standard VEX includes and the '&amp;' symbol.</small></body></html>
